<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>MusicaTeca</title>
  <!-- BOOTSTRAP -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
  <!-- CSS -->
  <link rel="stylesheet" href="style/estilo.css" />
</head>

<body>
  <header class="headerCor">
    <nav class="navbar navbar-expand-lg">
      <div class="container-fluid">
        <a class="navbar-brand" href="index.html">MusicaTeca</a>
        <button class="navbar-toggler border-white" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
          aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="white" class="bi bi-list"
            viewBox="0 0 16 16">
            <path fill-rule="evenodd"
              d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5" />
          </svg>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link" aria-current="page" href="pages/apresentaDados.html">Home</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </header>
  <main>
    <div id="containerMusicaTeca" class="container mx-auto">
      <h1>MusicaTeca</h1>

      <form class="centralizar" action="">
        <label for="" class="mb-3">Pesquise por artista:</label>

        <div class="input-group mb-3">
          <input type="text" class="form-control rounded-pill vidroInput" id="nomeArtista"/>
          <button onclick="pesquisaArtista()" data-bs-toggle="modal" data-bs-target="#exibirDados"
            class="btn pesquisar rounded-circle ms-2" type="button">
            <i class="bi bi-search"></i>
          </button>
        </div>

        <label for="" class="mb-3">Pesquise por música:</label>
        <div class="input-group mb-3">
          <input type="text" class="form-control rounded-pill vidroInput" id="nomeMusica" />
          <button onclick="pesquisaMusica()" data-bs-toggle="modal" data-bs-target="#exibirDados"
            class="btn pesquisar rounded-circle ms-2" type="button">
            <i class="bi bi-search"></i>
          </button>
        </div>
      </form>
    </div>
    <script src="js/main.js"></script>
  </main>

  <footer class="vidroInput rounded-0">Desenvolvedores</footer>

  <!-- MODAL ARTISTA -->
  <div class="modal" tabindex="-1" id="exibirDados">
    <div class="modal-dialog">
      <div class="modal-content vidro">
        <div class="modal-header text-white">
          <h5 class="modal-title">Exibir Dados</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          <!-- CARD -->
          <div class="card vidroCard" style="width: fit-content">
            <div class="card-body">
              <h5 class="card-title">Artista</h5>
              <p id="nome">Nome: </p>
              <p id="pais">País: </p>
              <p id="tipo">Tipo: </p>
              <p id="tag">Tag: </p>
              <p id="area">Área: </p>
              <p id="cidadeOrigem">Cidade de Origem: </p>
              <p id="anoInicio">Ano de ínicio: </p>
              <br>
              <a href="#" class="card-link">Link Spotify</a>
              <a href="#" class="card-link">Link Youtube</a>
            </div>
          </div>
          <!-- FIM CARD -->
        </div>
      </div>
    </div>
  </div>
  <!-- FIM MODAL -->

  <!-- MODAL MUSICA -->
  <div class="modal" tabindex="-1" id="exibirDados">
    <div class="modal-dialog">
      <div class="modal-content vidro">
        <div class="modal-header text-white">
          <h5 class="modal-title">Exibir Dados</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          <!-- CARD -->
          <div class="card vidroCard" style="width: fit-content">
            <div class="card-body">
              <h5 class="card-title">Música</h5>
              <p id="artistaMusica">Artista/ Banda</p>
              <p id="nome">Nome: </p>
              <p id="pais">País: </p>
              <p id="tipo">Tipo: </p>
              <p id="tag">Tag: </p>
              <p id="area">Área: </p>
              <p id="cidadeOrigem">Cidade de Origem: </p>
              <p id="anoInicio">Ano de ínicio: </p>
              <br>
              <a href="#" class="card-link">Link Spotify</a>
              <a href="#" class="card-link">Link Youtube</a>
            </div>
          </div>
          <!-- FIM CARD -->
        </div>
      </div>
    </div>
  </div>
  <!-- FIM MODAL -->

  <!-- SCRIPT -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>

</html>
